{% extends 'temp/userbase.html' %}
{% block base %}
<!DOCTYPE html>
<html>
<head>
	<title></title>
</head>
<body>
	<center>
		<h1 style="color: yellow">COMPLAINT</h1>
		<form method="post">
            {% csrf_token %}
			<table>
				<tr>
					<td>Complaint</td>
					<td><input type="text" name="cmpt" required="" class="form-control"></td>
				</tr>
			<tr>
					<td>Order</td>
					<td>
                        <select name="ord" required="">
                        <option>--select--</option>
                        {% for i in o %}
                        <option value="{{ i.o_id }}">{{i.p.p_name }}</option>
                        {% endfor %}
					</select>
                    </td>
				</tr>
				<tr>
					<td></td>
					<td><input type="submit" value="SUBMIT"></td>
				</tr>
			</table>
		</form>
	</center>

</body>
</html>
{% endblock %}
