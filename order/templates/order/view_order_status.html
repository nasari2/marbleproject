{% extends 'temp/userbase.html' %}
{% block base %}
<!DOCTYPE html>
<html>
<head>
	<title></title>
     <style>
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse:collapse; /* Collapses borders into a single border */
        }

        /* Styling the table headers */
        th {
            background-color: #4CAF50;
            color: black;
            padding: 10px;
        }

        /* Styling the table cells */
        td {
            padding: 10px;
            text-align: center;
            color: black;
        }

        /* Border styles for the table */
        table, th, td {
            border: 3px solid #000000; /* Light gray border */
        }

        /* Different border styles for rows */
        {#tr:nth-child(odd) {#}
        {#    background-color: #333333; /* Dark background for odd rows */#}
        {#}#}
        {##}
        {#tr:nth-child(even) {#}
        {#    background-color: #444444; /* Slightly lighter dark background for even rows */#}
        {#}#}
        {##}
        {#/* Hover effect for rows */#}
        {#tr:hover {#}
        {#    background-color: #555555; /* Hover effect */#}
        {#}#}

        /* Table title style */
        h1 {
            color: yellow;
             font-size: 90px;
            margin-bottom: 50px;
        }
        h2 {
            color: #b21f2d;
             font-size: 70px;
            margin-bottom: 50px;
        }

    </style>
</head>
<body>
	<center>
		<h1 style="color: yellow">View order status</h1>
		<table border="1" class="table table-striped">
			<tr style="color: white">
				<td>Username</td>
				<td>Product Name</td>
				<td>Date</td>
{#				<td>Quantity</td>#}
{#				<td>Status</td>#}
			</tr>
            {% for i in a %}
			<tr style="color: white">
				<td>{{ i.u.username }}</td>
				<td>{{ i.p.p_name }}</td>
				<td>{{ i.date_time }}</td>
{#				<td>{{ i.quantity }}</td>#}
{#				<td>{{ i.status }}</td>#}
{#            <td><a href="/paymentrazor/payment-form/{{ i.o_id }}" class="btn btn-primary">pay</a> </td>#}
			</tr>
            {% endfor %}
		</table>
	</center>

</body>
</html>
{% endblock %}
